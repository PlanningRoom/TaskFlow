<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <style>
    text{font-family:'Inter','Segoe UI',Arial,sans-serif;}
    .title{font-size:24px;font-weight:700;fill:#0f172a;}
    .sub{font-size:13.5px;fill:#64748b;}
    rect.card{filter:url(#sh);}
    .nt{font-size:15px;font-weight:600;fill:#0f172a;}
    .ns{font-size:11px;fill:#475569;}
    .bl{font-size:12.5px;font-weight:700;}
    .e{fill:none;stroke:#64748b;stroke-width:1.7;marker-end:url(#arrow);}
    .el{font-size:10.5px;fill:#475569;}
    .foot{font-size:11.5px;fill:#64748b;}
  </style>

  <rect width="1120" height="780" fill="#f8fafc"/>
  <text class="title" x="56" y="50">Container Composition — Single Host (Production)</text>
  <text class="sub" x="56" y="74">EC2 t4g.small · docker-compose.prod.yml · TDD §5.2 / §5.3</text>

  <!-- ingress from Cloudflare edge -->
  <rect class="card" x="56" y="110" width="240" height="54" rx="10" fill="#fff7ed" stroke="#f6821f" stroke-width="1.6"/>
  <text class="nt" x="176" y="138" text-anchor="middle">Cloudflare edge</text>
  <text class="ns" x="176" y="154" text-anchor="middle">proxied · Full (strict)</text>
  <path class="e" d="M176,164 V214"/>
  <text class="el" x="184" y="192">:443 / :80</text>

  <!-- EC2 host -->
  <rect x="56" y="214" width="1008" height="494" rx="14" fill="#ffffff" stroke="#334155" stroke-width="1.6"/>
  <text class="bl" x="76" y="240" fill="#334155">EC2 t4g.small — Docker host (Amazon Linux 2023 · arm64)</text>

  <!-- docker network -->
  <rect x="84" y="262" width="720" height="420" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text class="bl" x="100" y="286" fill="#475569" font-size="11.5px">Docker bridge network</text>

  <!-- nginx -->
  <rect class="card" x="110" y="300" width="300" height="130" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
  <text class="nt" x="130" y="328">nginx</text>
  <text class="ns" x="130" y="348">publishes :443 / :80 to host</text>
  <text class="ns" x="130" y="366">Origin CA cert · security headers</text>
  <text class="ns" x="130" y="384">/api/* · /ws → api</text>
  <text class="ns" x="130" y="402">/* → web (static)</text>

  <!-- web -->
  <rect class="card" x="110" y="470" width="300" height="96" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text class="nt" x="130" y="500">web</text>
  <text class="ns" x="130" y="520">nginx:alpine · :80</text>
  <text class="ns" x="130" y="538">Vite production build (static assets)</text>

  <!-- api -->
  <rect class="card" x="480" y="300" width="300" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <text class="nt" x="500" y="328">api</text>
  <text class="ns" x="500" y="348">FastAPI · Uvicorn (2 workers) · :8000</text>
  <text class="ns" x="500" y="368">+ APScheduler jobs (cleanup, pg_dump)</text>
  <text class="ns" x="500" y="386">+ broadcaster (Postgres LISTEN/NOTIFY)</text>
  <text class="ns" x="500" y="404">env hydrated from SSM at boot</text>
  <text class="ns" x="500" y="422">migrations: alembic upgrade head on start</text>

  <!-- db -->
  <rect class="card" x="480" y="490" width="300" height="110" rx="10" fill="#eef2ff" stroke="#336791" stroke-width="1.6"/>
  <text class="nt" x="500" y="520">db</text>
  <text class="ns" x="500" y="540">PostgreSQL 16 · :5432</text>
  <text class="ns" x="500" y="558">named volume → pgdata</text>

  <!-- host-side mounts / agent (right column) -->
  <text class="bl" x="852" y="286" fill="#475569" font-size="11.5px">Host mounts &amp; agent</text>
  <rect class="card" x="852" y="300" width="190" height="80" rx="9" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text class="nt" x="868" y="326" font-size="13px">pgdata volume</text>
  <text class="ns" x="868" y="345">/var/lib/postgresql/data</text>
  <text class="ns" x="868" y="362">persists across redeploys</text>

  <rect class="card" x="852" y="396" width="190" height="80" rx="9" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text class="nt" x="868" y="422" font-size="13px">Origin CA cert</text>
  <text class="ns" x="868" y="441">/etc/nginx/certs (host path)</text>
  <text class="ns" x="868" y="458">mounted read-only into nginx</text>

  <rect class="card" x="852" y="492" width="190" height="80" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text class="nt" x="868" y="518" font-size="13px">CloudWatch Agent</text>
  <text class="ns" x="868" y="537">ships logs &amp; metrics</text>
  <text class="ns" x="868" y="554">(host, not a container)</text>

  <!-- env from SSM -->
  <rect class="card" x="480" y="636" width="300" height="50" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text class="ns" x="496" y="658" font-weight="600" fill="#0f172a">Environment ← SSM Parameter Store</text>
  <text class="ns" x="496" y="674">/taskflow/prod/* injected at boot</text>

  <!-- edges -->
  <path class="e" d="M260,430 V470"/>
  <text class="el" x="268" y="454">/* static</text>
  <path class="e" d="M410,360 H478"/>
  <text class="el" x="420" y="350">/api/* · /ws</text>
  <path class="e" d="M630,450 V488"/>
  <text class="el" x="638" y="474">asyncpg + LISTEN/NOTIFY</text>
  <path class="e" d="M780,545 H850"/>
  <text class="el" x="788" y="536">volume</text>
  <path class="e" d="M630,636 V602" />
  <text class="el" x="638" y="624">secrets</text>

  <text class="foot" x="56" y="740">Dev differs (not shown): Vite runs on the host, MailHog replaces Resend, no Origin CA cert, no CloudWatch Agent. Prod has no certbot — the Origin CA cert is long-lived (TDD §5.4).</text>
</svg>
