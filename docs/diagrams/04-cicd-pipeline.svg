<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="640" viewBox="0 0 1240 640">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <style>
    text{font-family:'Inter','Segoe UI',Arial,sans-serif;}
    .title{font-size:24px;font-weight:700;fill:#0f172a;}
    .sub{font-size:13.5px;fill:#64748b;}
    rect.card{filter:url(#sh);}
    .step{font-size:13px;font-weight:600;fill:#0f172a;}
    .ns{font-size:10.5px;fill:#475569;}
    .num{font-size:11px;font-weight:700;fill:#ffffff;}
    .e{fill:none;stroke:#64748b;stroke-width:1.8;marker-end:url(#arrow);}
    .lane{font-size:12px;font-weight:700;fill:#64748b;}
    .foot{font-size:11.5px;fill:#64748b;}
  </style>

  <rect width="1240" height="640" fill="#f8fafc"/>
  <text class="title" x="56" y="50">CI/CD Pipeline  (Part I3)</text>
  <text class="sub" x="56" y="74">.github/workflows/deploy.yml · triggered on push to main · TDD §14.2 / §14.4</text>

  <!-- lane labels -->
  <rect x="40" y="118" width="700" height="6" rx="3" fill="#dbeafe"/>
  <text class="lane" x="44" y="138" fill="#2563eb">GitHub-hosted runner</text>
  <rect x="40" y="330" width="916" height="6" rx="3" fill="#dcfce7"/>
  <text class="lane" x="44" y="356" fill="#059669">EC2 host · via SSM Run Command</text>

  <!-- TOP ROW (left → right): steps 1–5 -->
  <!-- 1 -->
  <rect class="card" x="40" y="160" width="206" height="92" rx="11" fill="#ffffff" stroke="#475569" stroke-width="1.6"/>
  <circle cx="64" cy="184" r="11" fill="#475569"/><text class="num" x="64" y="188" text-anchor="middle">1</text>
  <text class="step" x="84" y="188">git push → main</text>
  <text class="ns" x="56" y="214">developer merges PR</text>
  <text class="ns" x="56" y="231">to the default branch</text>

  <!-- 2 -->
  <rect class="card" x="280" y="160" width="206" height="92" rx="11" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <circle cx="304" cy="184" r="11" fill="#2563eb"/><text class="num" x="304" y="188" text-anchor="middle">2</text>
  <text class="step" x="324" y="188">Assume role (OIDC)</text>
  <text class="ns" x="296" y="214">taskflow-deploy-role</text>
  <text class="ns" x="296" y="231">no long-lived keys</text>

  <!-- 3 -->
  <rect class="card" x="520" y="160" width="206" height="92" rx="11" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <circle cx="544" cy="184" r="11" fill="#2563eb"/><text class="num" x="544" y="188" text-anchor="middle">3</text>
  <text class="step" x="564" y="188">Build images</text>
  <text class="ns" x="536" y="214">linux/arm64 · api + web</text>
  <text class="ns" x="536" y="231">tag = commit SHA</text>

  <!-- 4 -->
  <rect class="card" x="760" y="160" width="206" height="92" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <circle cx="784" cy="184" r="11" fill="#f59e0b"/><text class="num" x="784" y="188" text-anchor="middle">4</text>
  <text class="step" x="804" y="188">Push → ECR</text>
  <text class="ns" x="776" y="214">taskflow/api · taskflow/web</text>
  <text class="ns" x="776" y="231">lifecycle-policied</text>

  <!-- 5 -->
  <rect class="card" x="1000" y="160" width="206" height="92" rx="11" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <circle cx="1024" cy="184" r="11" fill="#f59e0b"/><text class="num" x="1024" y="188" text-anchor="middle">5</text>
  <text class="step" x="1044" y="188">cloudformation deploy</text>
  <text class="ns" x="1016" y="214">changed stacks only</text>
  <text class="ns" x="1016" y="231">(network/compute/…)</text>

  <!-- BOTTOM ROW (right → left): steps 6–9 -->
  <!-- 6 -->
  <rect class="card" x="1000" y="372" width="206" height="92" rx="11" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
  <circle cx="1024" cy="396" r="11" fill="#059669"/><text class="num" x="1024" y="400" text-anchor="middle">6</text>
  <text class="step" x="1044" y="400">SSM: migrate</text>
  <text class="ns" x="1016" y="426">alembic upgrade head</text>
  <text class="ns" x="1016" y="443">on the EC2 host</text>

  <!-- 7 -->
  <rect class="card" x="760" y="372" width="206" height="92" rx="11" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
  <circle cx="784" cy="396" r="11" fill="#059669"/><text class="num" x="784" y="400" text-anchor="middle">7</text>
  <text class="step" x="804" y="400">SSM: restart</text>
  <text class="ns" x="776" y="426">docker compose pull</text>
  <text class="ns" x="776" y="443">&amp;&amp; up -d --remove-orphans</text>

  <!-- 8 -->
  <rect class="card" x="520" y="372" width="206" height="92" rx="11" fill="#ecfdf5" stroke="#059669" stroke-width="1.6"/>
  <circle cx="544" cy="396" r="11" fill="#059669"/><text class="num" x="544" y="400" text-anchor="middle">8</text>
  <text class="step" x="564" y="400">Smoke check</text>
  <text class="ns" x="536" y="426">GET /health from workflow</text>
  <text class="ns" x="536" y="443">fail on non-200</text>

  <!-- 9 -->
  <rect class="card" x="280" y="372" width="206" height="92" rx="11" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <circle cx="304" cy="396" r="11" fill="#059669"/><text class="num" x="304" y="400" text-anchor="middle">✓</text>
  <text class="step" x="324" y="400">Deployed</text>
  <text class="ns" x="296" y="426">new SHA live behind</text>
  <text class="ns" x="296" y="443">Cloudflare edge</text>

  <!-- edges top row -->
  <path class="e" d="M246,206 H278"/>
  <path class="e" d="M486,206 H518"/>
  <path class="e" d="M726,206 H758"/>
  <path class="e" d="M966,206 H998"/>
  <!-- wrap down from step 5 to step 6 -->
  <path class="e" d="M1103,252 V372"/>
  <text class="ns" x="1112" y="316">then</text>
  <!-- edges bottom row (right → left) -->
  <path class="e" d="M1000,418 H968"/>
  <path class="e" d="M760,418 H728"/>
  <path class="e" d="M520,418 H488"/>

  <!-- rollback -->
  <rect x="40" y="510" width="1166" height="70" rx="11" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text class="step" x="60" y="540" fill="#b91c1c">Rollback (runbook · TDD §14.4)</text>
  <text class="ns" x="60" y="562">Re-run the deploy pinned to the previous commit SHA (image still in ECR) and the last-good CloudFormation templates; the smoke check gates promotion. DB migrations are forward-only — design them additive/backward-compatible.</text>

  <text class="foot" x="40" y="612">Secrets are never in the workflow — the api reads them from SSM Parameter Store at boot. Steps 6–8 run on the host through SSM Run Command, so no inbound SSH is required.</text>
</svg>
