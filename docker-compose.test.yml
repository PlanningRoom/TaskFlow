services:
  db:
    image: postgres:16-alpine
    # Test-only durability tweaks (TDD §16, E3). tmpfs already removes the
    # storage layer; turning off fsync + synchronous_commit halves commit
    # latency on writes, which add up across the integration suite.
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow_test
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  api-test:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow_test
      TEST_DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow_test
      APP_ENV: test
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "uv sync --frozen && exec pytest -q"]
    volumes:
      - ./apps/api:/app
