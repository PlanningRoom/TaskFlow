# Per ADR 086: Dependabot covers npm (frontend) and pip (backend).
# CI does not fail on advisories — weekly triage cadence per ADR.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      react-and-build-tooling:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "vite"
          - "@vitejs/*"
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/apps/api"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
