name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Biome (TS/JS)
        run: pnpm exec biome ci .

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: apps/api
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: apps/api
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck (workspaces)
        run: pnpm typecheck

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: mypy
        working-directory: apps/api
        run: uv run mypy taskflow tests

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@localhost:5432/taskflow_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: pytest
        working-directory: apps/api
        run: uv run pytest -q
