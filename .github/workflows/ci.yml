name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Biome (TS/JS)
        run: pnpm exec biome ci .

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: apps/api
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: apps/api
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck (workspaces)
        run: pnpm typecheck

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: mypy
        working-directory: apps/api
        run: uv run mypy taskflow tests

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@localhost:5432/taskflow_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: pytest
        working-directory: apps/api
        run: uv run pytest -q

  nginx-config:
    name: nginx -t
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nginx + snake-oil certs
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx ssl-cert

      - name: Validate nginx.conf
        run: |
          # Production config references Let's Encrypt cert paths and the
          # docker-compose service names `api`/`web` that don't resolve on the
          # runner. Substitute snake-oil certs and a loopback host so `nginx -t`
          # can complete cert/upstream resolution and exercise the rest of the
          # config. Prod parity is enforced in Phase I2 against the real image.
          mkdir -p /tmp/nginx-test
          sed \
            -e 's|/etc/letsencrypt/live/taskflow/fullchain.pem|/etc/ssl/certs/ssl-cert-snakeoil.pem|' \
            -e 's|/etc/letsencrypt/live/taskflow/privkey.pem|/etc/ssl/private/ssl-cert-snakeoil.key|' \
            -e 's|server api:8000;|server 127.0.0.1:8000;|' \
            -e 's|server web:80;|server 127.0.0.1:80;|' \
            infra/nginx/nginx.conf > /tmp/nginx-test/nginx.conf
          sudo nginx -t -c /tmp/nginx-test/nginx.conf
