name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Biome (TS/JS)
        run: pnpm exec biome ci .

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Ruff lint
        working-directory: apps/api
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: apps/api
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck (workspaces)
        run: pnpm typecheck

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: mypy
        working-directory: apps/api
        run: uv run mypy taskflow tests

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@localhost:5432/taskflow_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: pytest
        working-directory: apps/api
        # Coverage gate at the Phase E3 spec floor of 85% on services + auth
        # combined. Actual coverage is ~98% (see implementation-status.md E3
        # note, 2026-05-30). NB: `[tool.coverage.run] concurrency` in
        # pyproject.toml is required for accurate measurement — the integration
        # suite drives endpoints through httpx's ASGI transport, which runs
        # under threads/greenlet; without it coverage silently undercounts
        # every line reached via the HTTP path.
        run: |
          uv run pytest -q \
            --cov=taskflow.services \
            --cov=taskflow.auth \
            --cov-report=term-missing \
            --cov-fail-under=85

  web-tests:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Vitest + coverage
        # The 80% gate on components/ + features/ lives in
        # apps/web/vitest.config.ts; `--coverage` fails the job if any metric
        # dips below it (Phase H5). Runs well under the 5-minute budget.
        run: pnpm --filter @taskflow/web test -- --coverage

  build-images:
    name: Build images
    runs-on: ubuntu-latest
    # TDD §14.1: catch a broken Dockerfile in CI rather than at deploy time.
    # Builds run on the runner's native arch; the production linux/arm64 build
    # is exercised by deploy.yml (buildx + QEMU, ADR 038).
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -t taskflow/api:ci apps/api

      - name: Build web image
        # Same context/Dockerfile split as deploy.yml — the web image needs the
        # repo root for the pnpm workspace files.
        run: docker build -f apps/web/Dockerfile -t taskflow/web:ci .

  nginx-config:
    name: nginx -t
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nginx + snake-oil certs
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx ssl-cert

      - name: Validate nginx.conf
        run: |
          # Production config references the Cloudflare Origin CA cert paths
          # (ADR 085) and the docker-compose service names `api`/`web` that
          # don't resolve on the runner. Substitute snake-oil certs and a
          # loopback host so `nginx -t` can complete cert/upstream resolution
          # and exercise the rest of the config.
          mkdir -p /tmp/nginx-test
          sed \
            -e 's|/etc/nginx/certs/origin.pem|/etc/ssl/certs/ssl-cert-snakeoil.pem|' \
            -e 's|/etc/nginx/certs/origin.key|/etc/ssl/private/ssl-cert-snakeoil.key|' \
            -e 's|server api:8000;|server 127.0.0.1:8000;|' \
            -e 's|server web:80;|server 127.0.0.1:80;|' \
            infra/nginx/nginx.conf > /tmp/nginx-test/nginx.conf
          sudo nginx -t -c /tmp/nginx-test/nginx.conf

  cfn-lint:
    name: cfn-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint infra/cloudformation/*.yml

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Phase I1 (ADR 080 / TDD §16.3): drive the six product journeys against a
    # real, seeded `docker compose up` stack. Target wall-clock < 15 minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install Playwright browser
        run: pnpm --filter @taskflow/e2e exec playwright install --with-deps chromium

      - name: Provision .env.local
        # docker-compose services read env from .env.local (see docker-compose.yml).
        run: cp .env.example .env.local

      - name: Boot the stack
        run: docker compose up -d --build

      - name: Wait for the API and web to come up
        # The api runs migrations on startup; the web container does a cold
        # `pnpm install` before Vite serves — allow a generous ceiling.
        run: |
          for i in $(seq 1 90); do
            curl -fsS http://localhost:8000/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:8000/health
          for i in $(seq 1 90); do
            curl -fsS http://localhost:5173 >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:5173 >/dev/null

      - name: Seed the demo workspace
        run: docker compose run --rm api python -m taskflow.scripts.seed

      - name: Run Playwright journeys
        run: pnpm --filter @taskflow/e2e exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Dump stack logs
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  openapi-drift:
    name: OpenAPI drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Regenerate OpenAPI types
        # Dumps the schema offline (no Postgres) and runs openapi-typescript.
        run: pnpm --filter @taskflow/api-types gen:api

      - name: Fail if generated types are stale
        # The committed openapi.json + schema.d.ts must match a fresh codegen
        # (TDD §14.1). If this fails, run `pnpm gen:api` and commit the result.
        run: git diff --exit-code packages/api-types/openapi.json packages/api-types/src/generated/schema.d.ts
