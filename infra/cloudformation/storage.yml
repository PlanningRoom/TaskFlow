AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  TaskFlow storage stack (TDD §5.1; ADR 074). Two private, SSE-S3-encrypted S3
  buckets: nightly Postgres backups (versioned, 30-day expiry) and Vite source
  maps for production error symbolication.

Resources:
  BackupsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub taskflow-backups-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-backups-30d
            Status: Enabled
            Prefix: backups/
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 1
          - Id: abort-incomplete-multipart
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  SourceMapsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub taskflow-source-maps-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-source-maps-90d
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  BackupsBucketName:
    Value: !Ref BackupsBucket
    Export:
      Name: taskflow-storage-BackupsBucketName
  SourceMapsBucketName:
    Value: !Ref SourceMapsBucket
    Export:
      Name: taskflow-storage-SourceMapsBucketName
