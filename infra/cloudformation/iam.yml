AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  TaskFlow IAM stack (TDD §5.1, §14.3; ADR 073). GitHub Actions OIDC provider +
  the narrow `taskflow-deploy-role` assumed by CI (no long-lived keys), and the
  EC2 instance role/profile granting the host read-only access to its runtime
  secrets in SSM, image pulls from ECR, backup writes to S3, and log shipping.

Parameters:
  GitHubOrg:
    Type: String
    Default: PlanningRoom
    Description: GitHub org/owner that owns the TaskFlow repo (OIDC trust scope).
  GitHubRepo:
    Type: String
    Default: TaskFlow
    Description: GitHub repository name (OIDC trust scope).
  CreateOidcProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >-
      Create the GitHub OIDC provider. Set false if the account already has a
      provider for token.actions.githubusercontent.com (one per account).

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, "true"]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # GitHub's Actions OIDC root thumbprints. AWS validates the JWT against its
      # trusted-CA library, but CloudFormation still requires the field.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: taskflow-deploy-role
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: taskflow-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EcrAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: EcrPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource:
                  - !Sub arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/taskflow/api
                  - !Sub arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/taskflow/web
              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ValidateTemplate
                Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/taskflow-*/*
              - Sid: SsmRunCommand
                Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
              - Sid: DescribeInstances
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: "*"
              - Sid: PassTaskflowRoles
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/taskflow-*

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: taskflow-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Session Manager shell + the CloudWatch Agent's metric publishing.
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: taskflow-instance
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadRuntimeSecrets
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/taskflow/prod/*
              - Sid: DecryptSecrets
                Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com
              - Sid: EcrPull
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"
              - Sid: BackupWrite
                Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:${AWS::Partition}:s3:::taskflow-backups-${AWS::AccountId}-${AWS::Region}/backups/*
              - Sid: ShipLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:CreateLogGroup
                  - logs:DescribeLogStreams
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/taskflow/prod/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: taskflow-instance-profile
      Roles:
        - !Ref InstanceRole

Outputs:
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
    Export:
      Name: taskflow-iam-DeployRoleArn
  InstanceProfileName:
    Value: !Ref InstanceProfile
    Export:
      Name: taskflow-iam-InstanceProfileName
  InstanceRoleArn:
    Value: !GetAtt InstanceRole.Arn
    Export:
      Name: taskflow-iam-InstanceRoleArn
