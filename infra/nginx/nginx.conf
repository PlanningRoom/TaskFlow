# TaskFlow nginx reverse proxy (Phase E1 / ADR 083; TLS updated in I2 / ADR 085).
#
# Production topology: this is the origin behind the Cloudflare proxy. Public TLS
# terminates at the Cloudflare edge; the edge<->origin hop is secured here with a
# long-lived Cloudflare Origin CA certificate (Cloudflare set to Full strict).
# There is no certbot and no renewal cron. Upstream containers are HTTP-only on
# the internal docker network. The :80 block redirects to https; the :443 block
# applies the security headers, proxies /api/* and /ws to the api container, and
# serves the SPA from the web container.
#
# Cert/key are mounted from the host at /etc/nginx/certs (see
# docker-compose.prod.yml). For CI we substitute snake-oil cert paths before
# running `nginx -t` — see .github/workflows/ci.yml's `nginx-config` job.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Required for proxying WebSocket upgrades.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream taskflow_api {
        server api:8000;
    }

    upstream taskflow_web {
        server web:80;
    }

    # HTTP -> HTTPS redirect. (Cloudflare also redirects at the edge; this covers
    # any direct origin hit.)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main TLS-terminated server.
    server {
        # `http2` as a `listen` parameter (legacy syntax, nginx <1.25) is what
        # Ubuntu 22.04's nginx 1.18 understands; nginx 1.25+ also accepts it
        # though it prefers the standalone `http2 on;` directive.
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # Cloudflare Origin CA certificate (ADR 085), mounted from the host.
        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (ADR 083). `always` so they apply on error responses too.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss://$host; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-Frame-Options "DENY" always;

        client_max_body_size 1m;

        # API.
        location /api/ {
            proxy_pass         http://taskflow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Request-Id      $http_x_request_id;
            proxy_read_timeout 60s;
        }

        # WebSocket. Long read timeout for idle subscriptions; ADR 045.
        location /ws {
            proxy_pass         http://taskflow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health endpoint exposed directly (no /api prefix).
        location = /health {
            proxy_pass         http://taskflow_api;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # SPA fallback. The web container's own nginx handles try_files for client routes.
        location / {
            proxy_pass         http://taskflow_web;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
