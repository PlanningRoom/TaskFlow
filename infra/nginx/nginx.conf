# TaskFlow nginx reverse proxy (Phase E1 / ADR 083).
#
# Production topology: TLS terminates here; upstream containers are HTTP-only on
# the internal docker network. The :80 server block redirects to https. The :443
# server block applies the security headers, proxies /api/* and /ws to the api
# container, and serves the SPA from the web container.
#
# Certificate paths use Let's Encrypt's default layout (issued + renewed by
# certbot in Phase I2). For CI we substitute snake-oil cert paths before running
# `nginx -t` — see .github/workflows/ci.yml's `nginx-config` job.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Required for proxying WebSocket upgrades.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream taskflow_api {
        server api:8000;
    }

    upstream taskflow_web {
        server web:80;
    }

    # HTTP -> HTTPS redirect.
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt http-01 challenge path; everything else redirects.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main TLS-terminated server.
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/taskflow/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/taskflow/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (ADR 083). `always` so they apply on error responses too.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss://$host; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header X-Frame-Options "DENY" always;

        client_max_body_size 1m;

        # API.
        location /api/ {
            proxy_pass         http://taskflow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Request-Id      $http_x_request_id;
            proxy_read_timeout 60s;
        }

        # WebSocket. Long read timeout for idle subscriptions; ADR 045.
        location /ws {
            proxy_pass         http://taskflow_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health endpoint exposed directly (no /api prefix).
        location = /health {
            proxy_pass         http://taskflow_api;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # SPA fallback. The web container's own nginx handles try_files for client routes.
        location / {
            proxy_pass         http://taskflow_web;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
