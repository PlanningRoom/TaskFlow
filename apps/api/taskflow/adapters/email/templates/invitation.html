<!doctype html>
<html lang="en">
<body style="font-family: -apple-system, system-ui, sans-serif; color: #222; max-width: 560px; margin: 0 auto; padding: 24px;">
  <p>Hi,</p>
  <p><strong>{{ inviter_name }}</strong> invited you to join the <strong>{{ workspace_name }}</strong> workspace on TaskFlow.</p>
  <p>
    <a href="{{ accept_url }}" style="display: inline-block; background: #0d9488; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">Accept invitation</a>
  </p>
  <p style="color: #666; font-size: 13px;">Or paste this link into your browser:<br><a href="{{ accept_url }}">{{ accept_url }}</a></p>
  <p style="color: #666; font-size: 13px;">This link expires in 7 days. If you weren't expecting this, you can ignore this email.</p>
  <p style="color: #666; font-size: 13px;">— TaskFlow</p>
</body>
