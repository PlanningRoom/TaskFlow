services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - taskflow_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@db:5432/taskflow
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @taskflow/web dev"
    env_file:
      - .env.local
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  taskflow_db_data:
